services:
  - type: web
    name: matdao-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: standard   # matches your Basic plan with GPU
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: matdao-postgres
          property: connectionString
      - key: ZAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GLM_MODEL
        value: "glm-4.7-flash"
      - key: GLM_VISION_MODEL
        value: "glm-4.6v-flash"
      - key: GLM_OCR_MODEL
        value: "glm-ocr"
      - key: GLM_OCR_LAYOUT_ENDPOINT
        value: "https://open.bigmodel.cn/api/paas/v4/layout_parsing"
      - key: GLM_OCR_TIMEOUT_SECONDS
        value: "30"
      - key: OPENALEX_API_KEY
        sync: false
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: LLM_FALLBACK_ORDER
        value: "gemini,glm,openrouter,qwen,manus,kimi,minimax,liquid"
      - key: LLM_PROVIDER_TIMEOUT_SECONDS
        value: "120"
      - key: LLM_ADAPTIVE_ROUTING_ENABLED
        value: "true"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_API_URL
        value: "https://openrouter.ai/api/v1/chat/completions"
      - key: OPENROUTER_MODELS
        value: "z-ai/glm-4.5-air:free,minimax/minimax-m2.5:free,google/gemma-4-31b-it:free,openai/gpt-oss-120b:free,nousresearch/hermes-3-llama-3.1-405b:free,nvidia/nemotron-3-nano-30b-a3b:free"
      - key: OPENROUTER_MAX_MODELS_PER_EVAL
        value: "3"
      - key: OPENROUTER_REASONING_ENABLED
        value: "true"
      - key: OPENROUTER_SITE_URL
        sync: false
      - key: OPENROUTER_SITE_NAME
        value: "MatDAO"
      - key: KIMI_API_KEY
        sync: false
      - key: KIMI_BASE_URL
        value: "https://api.moonshot.cn/v1"
      - key: KIMI_MODEL
        value: "kimi-k2-latest"
      - key: MINIMAX_API_KEY
        sync: false
      - key: MINIMAX_BASE_URL
        sync: false
      - key: MINIMAX_MODEL
        sync: false
      - key: LIQUID_AI_API_KEY
        sync: false
      - key: LIQUID_AI_BASE_URL
        sync: false
      - key: LIQUID_AI_MODEL
        sync: false
      - key: QWEN_API_KEY
        sync: false
      - key: QWEN_BASE_URL
        value: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      - key: QWEN_MODEL
        value: "qwen-plus"
      - key: MANUS_API_KEY
        sync: false
      - key: MANUS_BASE_URL
        sync: false
      - key: MANUS_MODEL
        sync: false
      - key: OCR_FALLBACK_ORDER
        value: "pdf_text,glm_ocr,lighton_ocr"
      - key: OCR_MAX_UPLOAD_BYTES
        value: "25000000"
      - key: OCR_MAX_PAGES_SYNC_TEXT
        value: "30"
      - key: OCR_RENDER_MAX_PIXELS
        value: "4000000"
      - key: OCR_FALLBACK_TIMEOUT_SECONDS
        value: "75"
      - key: LIGHTONOCR_ENABLED
        value: "false"
      - key: LIGHTONOCR_BASE_URL
        sync: false
      - key: LIGHTONOCR_TIMEOUT_SECONDS
        value: "45"
      - key: LIGHTONOCR_HEALTH_TIMEOUT_SECONDS
        value: "3"
      - key: LIGHTONOCR_READINESS_CACHE_SECONDS
        value: "15"
      - key: LIGHTONOCR_INCLUDE_TEXT_PROMPT
        value: "false"
      - key: LIGHTONOCR_MODEL_PATH
        sync: false
      - key: LIGHTONOCR_MMPROJ_PATH
        sync: false
      - key: LIGHTONOCR_REQUIRE_LOCAL_PATHS
        value: "false"
      - key: LIGHTONOCR_CANARY_PERCENT
        value: "5"
      - key: ENABLE_EXTERNAL_API_CACHE
        value: "true"
      - key: ENABLE_CURATED_CACHE
        value: "true"
      - key: ENABLE_LOCAL_RERANKER
        value: "false"
      - key: ENABLE_LOCAL_PREFILTER
        value: "true"
      - key: LOCAL_MODEL_DEVICE
        value: "cpu"
      - key: LOCAL_MODEL_CACHE_DIR
        value: "/root/.cache/huggingface"
      - key: LOCAL_MODEL_LOAD_TIMEOUT_SECONDS
        value: "8"
    disk:
      name: falcon-model-cache
      mountPath: /root/.cache/huggingface
      sizeGB: 10

databases:
  - name: matdao-postgres
    databaseName: matdao
    plan: basic-1gb
