services:
  - type: web
    name: matdao-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: standard   # matches your Basic plan with GPU
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: matdao-postgres
          property: connectionString
      - key: ZAI_API_KEY
        sync: false
      - key: OPENALEX_API_KEY
        sync: false
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
    disk:
      name: falcon-model-cache
      mountPath: /root/.cache/huggingface
      sizeGB: 10

databases:
  - name: matdao-postgres
    databaseName: matdao
    plan: basic-1gb
