services:
  - type: web
    name: matdao-backend
    runtime: python
    repo: https://github.com/kenniii207/Matdao-AI-Scientific-Paper-Valuation
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: standard   # matches your Basic plan with GPU
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: matdao-postgres
          property: connectionString
      - key: ZAI_API_KEY
        sync: false
      - key: OPENALEX_API_KEY
        sync: false
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: ZHIPU_API_KEY
        sync: false
    disk:
      name: falcon-model-cache
      mountPath: /root/.cache/huggingface
      sizeGB: 10

databases:
  - name: matdao-postgres
    databaseName: matdao
    plan: basic-1gb
