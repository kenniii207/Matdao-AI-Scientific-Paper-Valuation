# render.yaml — Render Infrastructure-as-Code (Phase 2)
#
# Services:
#   1. matdao-backend  — FastAPI (GPU enabled for Falcon-OCR)
#   2. matdao-grobid   — Grobid CRF (Dedicated image)
#   3. matdao-postgres — Managed PostgreSQL
#
# Deploy:  render blueprint apply

services:
  # ── 1. FastAPI Backend (GPU enabled) ──────────────────────────────────
  - type: web
    name: matdao-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: starter          # Manual step: Enable GPU (Accelerated Compute) in Dashboard after deploy
    region: singapore      # Recommend matching region for all services
    branch: main
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: matdao-postgres
          property: connectionString
      - key: GROBID_URL
        fromService:
          name: matdao-grobid
          property: internalUrl
      - key: ZAI_API_KEY
        sync: false        # Required for GLM-OCR fallback
      - key: OPENALEX_API_KEY
        sync: false
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false
      - key: ZHIPU_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false

  # ── 2. Grobid (Separate Private Web Service) ──────────────────────────
  - type: web
    name: matdao-grobid
    runtime: image
    image:
      url: lfoppiano/grobid:latest-crf   # Lightweight CRF-only
    plan: starter          # 512MB RAM minimum
    region: singapore
    healthCheckPath: /api/isalive

databases:
  # ── 3. PostgreSQL Database ──────────────────────────────────────────
  - name: matdao-postgres
    databaseName: matdao
    user: matdao
    plan: basic-1gb        # Multi-region failover and 1GB RAM
    region: singapore
