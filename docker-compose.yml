# Docker Compose for MatDAO local development.
#
# Services:
#   - grobid:   Layer 1 CRF extraction (port 8070) — lightweight CPU-only ~478 MB
#   - postgres: PostgreSQL 16 with pgvector (port 5432)
#   - backend:  FastAPI application (port 8000)
#
# NOTE: Grobid does NOT touch Postgres — only the backend does.

services:
  grobid:
    image: grobid/grobid:0.9.0-crf   # CRF-only, ~478 MB, CPU-only — fits Render 1 GB RAM
    container_name: grobid
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    volumes:
      - grobid-data:/opt/grobid   # Persist cache/models across container restarts

  postgres:
    image: pgvector/pgvector:pg16
    container_name: matdao-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: matdao_db
      POSTGRES_USER: matdao
      POSTGRES_PASSWORD: matdao_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matdao -d matdao_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matdao-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://matdao:matdao_secret@postgres:5432/matdao_db}
      - GROBID_URL=http://grobid:8070          # Internal service name — CRF-only extractor
      - OPENALEX_API_KEY=${OPENALEX_API_KEY:-}
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY:-}
      - NIH_REPORTER_EMAIL=${NIH_REPORTER_EMAIL:-}
      - CROSSREF_EMAIL=${CROSSREF_EMAIL:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY:-}
    depends_on:
      grobid:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads   # Persist uploaded PDFs

volumes:
  pgdata:
  grobid-data:   # Named volume for Grobid cache/models (~5 GB storage budget on Render)
