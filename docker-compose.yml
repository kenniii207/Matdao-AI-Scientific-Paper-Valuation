# Docker Compose for MatDAO Development (Phase 2)
#
# Pipeline:
#   - Layer 1 (CPU): Grobid CRF (Lightweight extraction)
#   - Layer 1 (GPU fallback): Falcon-OCR 300M (Local inference)
#   - Layer 1 (API fallback): GLM-OCR (Z.ai)
#
# NOTE: To use Falcon-OCR locally with GPU, ensure you have NVIDIA Container Toolkit 
# installed and use 'deploy: resources: reservations: devices: - driver: nvidia'

services:
  grobid:
    image: lfoppiano/grobid:latest-crf
    container_name: grobid
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: matdao-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=matdao
      - POSTGRES_USER=matdao
      - POSTGRES_PASSWORD=matdao_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matdao -d matdao"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matdao-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://matdao:matdao_secret@postgres:5432/matdao
      - GROBID_URL=http://grobid:8070
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - OPENALEX_API_KEY=${OPENALEX_API_KEY:-}
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - SERPAPI_API_KEY=${SERPAPI_API_KEY:-}
    depends_on:
      grobid:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # Uncomment below if you have a local GPU and want to test Falcon-OCR
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: unless-stopped

volumes:
  pgdata:
