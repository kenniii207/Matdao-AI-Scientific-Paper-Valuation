# Docker Compose for MatDAO local development.
#
# Services:
# - grobid: Layer 1 NLP extraction (port 8070)
# - postgres: PostgreSQL 16 with pgvector (port 5432)

services:
  grobid:
    image: grobid/grobid:0.8.1
    container_name: matdao-grobid
    ports:
      - "8070:8070"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg16
    container_name: matdao-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: matdao_db
      POSTGRES_USER: matdao
      POSTGRES_PASSWORD: matdao_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matdao -d matdao_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
